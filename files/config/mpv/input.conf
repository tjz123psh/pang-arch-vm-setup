# 倍速播放
[ add speed -0.1
] add speed 0.1
{ add speed -0.5
} add speed 0.5
BS set speed 1.0

# 常用播放控制
SPACE cycle pause
f cycle fullscreen
o show-progress
m cycle mute
q quit-watch-later
Q quit

# 跳转
LEFT seek -5
RIGHT seek 5
Shift+LEFT seek -30
Shift+RIGHT seek 30

# 音量调节（替代 mpv.conf 中已失效的 volume-step）
UP add volume 2
DOWN add volume -2
WHEEL_UP add volume 2
WHEEL_DOWN add volume -2
