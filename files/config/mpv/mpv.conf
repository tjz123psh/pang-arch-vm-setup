# 默认音量 50，最大 150
volume=50
volume-max=200

# 不自动关闭（播完停在最后一帧，适合合集模式）
keep-open=yes

# 记住播放进度
save-position-on-quit=yes

# 流媒体缓存（对 B 站这种远程源有用）
cache=yes
cache-secs=300


# 截图保存到 Pictures
screenshot-directory=~/Pictures

# OSD
osd-level=1
osd-font-size=28
osd-bar=yes                 # 显示进度/音量/速度条

# 硬件解码（B 站 1080p 省 CPU）
hwdec=auto
video-sync=display-resample
interpolation=yes

# GPU 高质量缩放（画质更细腻，略吃性能）
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# 强制选择 1080p（或可用的最高画质）
ytdl-format=bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]

# 无边框（浮动窗更干净）
border=no

# 自动加载同名字幕
sub-auto=all

# 鼠标隐藏延迟（毫秒）
cursor-autohide=1000

# 关闭屏保
stop-screensaver=yes

# B 站弹窗播放配置（~/.local/bin/b23 使用，实际脚本在 ~/scripts/media/b23）
[b23]
profile-desc=Bilibili popup player
geometry=640x360
force-window=immediate
ontop=yes
title=正在加载 B 站视频...
# 不等待缓存填满，窗口弹出即播放；缓存放小避免等太久
cache-pause=no
cache-secs=10
